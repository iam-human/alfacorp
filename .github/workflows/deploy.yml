name: Deploy Laravel App

on:
  push:
    branches:
      - main # Target branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: ${{ secrets.PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Pastikan path ini sesuai dengan letak folder project di server / hosting Anda!
            cd /home/allfacor/alfacorp 
            
            # 1. Aktifkan maintenance mode agar user tidak mendapati error saat deploy
            php artisan down || true
            
            # 2. Ambil update kode terbaru secara paksa (menghindari error conflict jika ada file yang terubah di server)
            git fetch origin main
            git reset --hard origin/main
            
            # 3. Install dependency PHP (Composer)
            composer install --no-dev --optimize-autoloader
            
            # 4. Jalankan migrasi database
            php artisan migrate --force
            
            # 5. Buat link storage (jika belum ada)
            php artisan storage:link || true
            
            # 6. Install package JS dan build asset (Vite)
            npm install
            npm run build
            
            # 7. Optimasi caching Laravel
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            
            # 8. Restart queue worker (jika menggunakan queue)
            php artisan queue:restart || true
            
            # 9. Matikan maintenance mode (website online kembali)
            php artisan up
